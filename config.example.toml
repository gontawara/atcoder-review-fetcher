# config.toml にコピーして使う
[atcoder]
username = "gontawara"
contest_prefix = "abc"

[paths]
# 練習リポジトリ（問題・解説・提出コードを置く側）の絶対パス
practice_repo = "/Users/ryotaro/Documents/Claude/Projects/プログラミング/atcoder-practice"

[fetch]
request_interval_sec = 1.5
# --latest 時、開始からこの時間以内のコンテストだけ対象にする
max_age_hours = 12
editorial_lang = "ja"

[git]
enabled = true
push = true
remote = "origin"
branch = "main"
